<div class="challenge-container">
  <h2>Crea una Challenge</h2>
  <p>Versione Nuova</p>
  <form (ngSubmit)="onSubmit()">
    <div>
      <label for="secretRegex">Regex segreta</label>
      <input
        id="secretRegex"
        type="text"
        [(ngModel)]="secretRegex"
        name="secretRegex"
        placeholder="Es: ^[a-z]+$"
      />
    </div>

    <div>
      <label for="positiveExample">Esempio positivo</label>
      <input
        id="positiveExample"
        type="text"
        [(ngModel)]="positiveExample"
        name="positiveExample"
        placeholder="Stringa che fa match"
      />
    </div>

    <div>
      <label for="negativeExample">Esempio negativo</label>
      <input
        id="negativeExample"
        type="text"
        [(ngModel)]="negativeExample"
        name="negativeExample"
        placeholder="Stringa che NON fa match"
      />
    </div>

    <div>
      <label for="positiveControls">Controlli positivi (uno per riga)</label>
      <textarea
        id="positiveControls"
        [(ngModel)]="positiveControlsInput"
        name="positiveControlsInput"
        rows="4"
        placeholder="abc&#10;hello&#10;world"
      ></textarea>
    </div>

    <div>
      <label for="negativeControls">Controlli negativi (uno per riga)</label>
      <textarea
        id="negativeControls"
        [(ngModel)]="negativeControlsInput"
        name="negativeControlsInput"
        rows="4"
        placeholder="123&#10;ABC&#10;test!"
      ></textarea>
    </div>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Creazione...' : 'Crea Challenge' }}
    </button>
  </form>
</div>
