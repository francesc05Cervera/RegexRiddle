<div class="cc-container">
  <a routerLink="/challenges" class="cc-back">← Torna alla lista</a>

  <div class="cc-title">CREA CHALLENGE</div>
  <p class="cc-subtitle">Definisci la regex segreta e gli esempi di test.</p>

  <form (ngSubmit)="onSubmit()">

    <div class="cc-section">
      <div class="cc-section-title">Regex segreta</div>
      <div class="form-group">
        <label for="secretRegex">Pattern</label>
        <input
          id="secretRegex"
          type="text"
          [(ngModel)]="secretRegex"
          name="secretRegex"
          placeholder="Es: ^[a-z]+$"
        />
      </div>
    </div>

    <div class="cc-section">
      <div class="cc-section-title">Esempi visibili ai giocatori</div>
      <div class="cc-row">
        <div class="form-group">
          <label for="positiveExample">Esempio positivo</label>
          <input
            id="positiveExample"
            type="text"
            [(ngModel)]="positiveExample"
            name="positiveExample"
            placeholder="Stringa che fa match"
          />
        </div>
        <div class="form-group">
          <label for="negativeExample">Esempio negativo</label>
          <input
            id="negativeExample"
            type="text"
            [(ngModel)]="negativeExample"
            name="negativeExample"
            placeholder="Stringa che NON fa match"
          />
        </div>
      </div>
    </div>

    <div class="cc-section">
      <div class="cc-section-title">Controlli di verifica</div>
      <div class="cc-row">
        <div class="form-group">
          <label for="positiveControls">Controlli positivi</label>
          <textarea
            id="positiveControls"
            [(ngModel)]="positiveControlsInput"
            name="positiveControlsInput"
            rows="5"
            placeholder="abc&#10;hello&#10;world"
          ></textarea>
        </div>
        <div class="form-group">
          <label for="negativeControls">Controlli negativi</label>
          <textarea
            id="negativeControls"
            [(ngModel)]="negativeControlsInput"
            name="negativeControlsInput"
            rows="5"
            placeholder="123&#10;ABC&#10;test!"
          ></textarea>
        </div>
      </div>
    </div>

    @if (errorMessage) {
      <p class="msg-error">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="msg-success">{{ successMessage }}</p>
    }

    <div class="cc-footer">
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Creazione...' : 'CREA CHALLENGE' }}
      </button>
    </div>

  </form>
</div>
