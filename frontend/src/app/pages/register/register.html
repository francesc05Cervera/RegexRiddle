<div class="register-container">
  <div class="register-box">
    <div class="register-logo">REGEX<span style="color:var(--text)">RIDDLE</span></div>
    <p class="register-tagline">Crea il tuo account.</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="Il tuo username" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="La tua email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </div>

      @if (errorMessage) {
        <p class="msg-error">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="isLoading">
  {{ isLoading ? 'Registrazione...' : 'REGISTRATI' }}
</button>
    </form>

    <p class="register-footer">Hai già un account? <a routerLink="/login">Accedi</a></p>
  </div>
</div>
